workflows:
  ios-release:
    name: iOS Release
    environment:
      flutter: 3.38.0
      xcode: 26.0
      cocoapods: default
      groups:
        - ios_signing
      vars:
        DEV_EMAIL: "kensaku.ikeda04@gmail.com"
        GOOGLE_SERVICE_INFO_PLIST: $GOOGLE_SERVICE_INFO_PLIST
        BUNDLE_ID: "com.ikcoding.maikago"
    integrations:
      app_store_connect: "Codemagic Connect Key"
    instance_type: mac_mini_m1
    scripts:
      - name: Set up keychain to be used for codesigning
        script: |
          keychain initialize

      - name: Set up signing certificate and provisioning profile
        script: |
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY
          keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Create env.json placeholder
        script: |
          echo '{}' > env.json

      - name: Create GoogleService-Info.plist
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist

      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter analyze
        script: |
          flutter analyze --no-fatal-infos || true

      - name: Flutter unit tests
        script: |
          flutter test --exclude-tags=integration

      - name: Build ipa for distribution
        script: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //' | sed 's/+.*//')
          BUILD_NUMBER=$(grep 'version:' pubspec.yaml | head -1 | sed 's/.*+//')
          echo "Building version $VERSION+$BUILD_NUMBER"
          flutter build ipa --release \
            --build-name=$VERSION \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
        beta_groups:
          - "Internal Testing"
      email:
        recipients:
          - $DEV_EMAIL
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release
    environment:
      flutter: stable
      android_signing:
        - keystore_reference
      groups:
        - google_play_credentials
      vars:
        DEV_EMAIL: "kensaku.ikeda04@gmail.com"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Create env.json placeholder
        script: |
          echo '{}' > env.json

      - name: Set up key.properties for Android signing
        script: |
          cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF

      - name: Flutter analyze
        script: |
          flutter analyze --no-fatal-infos || true

      - name: Flutter unit tests
        script: |
          flutter test --exclude-tags=integration

      - name: Build AAB for distribution
        script: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //' | sed 's/+.*//')
          BUILD_NUMBER=$(grep 'version:' pubspec.yaml | head -1 | sed 's/.*+//')
          echo "Building version $VERSION+$BUILD_NUMBER"
          flutter build appbundle --release \
            --build-name=$VERSION \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: production
      email:
        recipients:
          - $DEV_EMAIL
        notify:
          success: true
          failure: true
